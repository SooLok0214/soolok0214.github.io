<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.container {
            display: flex;
            /*horizontal aligment*/
            justify-content: center;
            /*vertical aligment*/
            align-items: center;
            /*control the space between items*/
            gap: 30px;
            min-height: 200px;
            background: linear-gradient(to right, rgb(225, 76, 76), rgb(255, 172, 223));
            padding: 30px;
        }

        body {
            margin: 0px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>item 1</div>
        <div>item 2</div>
        <div>item 3</div>
        <div>item 4</div>
        <div>item 5</div>
        <div>item 6</div>
    </div>
</body>

</html>
