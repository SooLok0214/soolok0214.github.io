<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 10px 120px;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-size: 65px;
        }

        div {
            font-size: 20px;
        }

        div.header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        div.container {
            display: flex;
            gap: 40px;
            align-items: center
        }



        div.request {
            border: 2px solid;
            border-radius: 10px;
            padding: 20px 30px;
        }

        div.logo {
            font-size: 45px;
            font-weight: bold;
        }

        div.title {
            margin-top: 30px;
            letter-spacing: 4px;
        }

        p.intro {
            font-size: 20px;
            line-height: 1.5;
            letter-spacing: 2px;
        }

        button.booking {
            background-color: rgb(0, 0, 0);
            color: white;
            font-size: 20px;
            border-radius: 15px;
            margin-top: 20px;
            padding: 20px 35px;
        }

        div.content {
            display: flex;
        }

        div.illus {
            margin-left: 135px;
            margin-top: 60px;
        }

        div.company {
            display: flex;
            justify-content: center;
            justify-content: space-around;
            margin-top: 50px;
        }

        img.companylogo {
            width: 120px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo"><img src="img/Logo.png" alt="Positivus Logo" width="40"> Positivus</div>
        <div class="container">
            <div class="about">About us</div>
            <div class="service">Services</div>
            <div class="cases">Use Cases</div>
            <div class="pricing">Pricing</div>
            <div class="blog">Blog</div>
            <div class="request">Request a quote</div>
        </div>
    </div>
    <div class="content">
        <div class="title">
            <h1>Navigating the <br />digital landscape <br />for success</h1>
            <p class="intro">Our digital marketing agency helps businesses<br />grow and succeed online through a range
                of
                <br />services including SEO, PPC, social media marketing.<br />and content creation.
            </p>
            <button class="booking">Book a consultation</button>
        </div>
        <div class="illus">
            <img src="img/illstration.png" alt="Content Image" width="550px">
        </div>
    </div>
    <div class="company">
        <div><img class="companylogo" src="img/Amazon.png" alt="Amazon"></div>
        <div><img class="companylogo" src="img/Lnillle.png" alt="Lnillle"></div>
        <div><img class="companylogo" src="img/Hubspot.png" alt="Hubspot"></div>
        <div><img class="companylogo" src="img/Notion.png" alt="Notion"></div>
        <div><img class="companylogo" src="img/Netflix.png" alt="Netflix"></div>
        <div><img class="companylogo" src="img/Zoom.png" alt="Zoom"></div>
    </div>
</body>

</html>
