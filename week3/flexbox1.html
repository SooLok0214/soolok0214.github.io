<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox1</title>
</head>
<style>
    body {
        background-color: #F8F6F0;
        margin: 150px 0px;
        font-family: Arial, Helvetica, sans-serif;
    }

    div.container {
        display: flex;
        gap: 20px;
        margin: auto;
        max-width: 1024px;

    }

    div.img {
        background-color: #FFFFFF;
        padding: 15px;
        border-radius: 15px;
    }

    h1 {
        font-size: 23px;
        margin-bottom: -5px;
    }

    p {
        font-size: 13px;
        line-height: 1.5;
    }

    img.container {
        border-radius: 7px;
        width: 100%;
    }

    div.font {
        padding: 20px;
        margin-top: -15px;
    }
</style>

<body>
    <div class="container">
        <div class="img">
            <img class="container" src="img/flexbox1/Residential projects.jpg" alt="Residential projects">
            <div class="font">
                <h1>Residential projects</h1>
                <p>We build sustainable and modem homes forcomfortable living.</p>
            </div>
        </div>
        <div class="img">
            <img class="container" src="img/flexbox1/Commercial spaces.jpg" alt="Commercial spaces">
            <div class="font">
                <h1>Commercial spaces</h1>
                <p>We create efficient, inspiring workspaces forbusinesses of all sizes.</p>
            </div>
        </div>
        <div class="img">
            <img class="container" src="img/flexbox1/Infrastructure works.jpg" alt="Infrastructure works">
            <div class="font">
                <h1>Infrastructure works</h1>
                <p>We develop strong, reliable infrastructure forgrowing communities.</p>
            </div>
        </div>
    </div>
</body>

</html>
