<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            margin: 0px;
            font-family: "Archivo", sans-serif;
            font-weight: bold;
        }

        div.bar {
            background-color: rgb(255, 249, 241);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 80px;
        }

        ul.manu {
            list-style-type: none;
            justify-content: center;
            display: flex;
            gap: 20px;
            margin: 0px;
            padding: 0px;
            font-weight: normal;
            font-size: 14px;
        }

        li.services {
            color: #F2612F;
        }

        div.bar_contact {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        div.contact_button {
            background-color: #F2612F;
            color: white;
            border: 0px solid;
            border-radius: 5px;
            margin: 0px 1px;
            padding: 12px 18px;
            font-size: 14px;
        }

        img.logo {
            margin: auto;
            width: 205px;
        }

        img.phoneicon {
            margin: auto;
            width: 25px;
        }

        img.burger {
            margin: auto;
            width: 25px;
        }

        img.burger {
            display: none;
        }

        @media screen and (max-width: 980px) {}
    </style>
</head>

<body>
    <div class="bar">
        <div>
            <img class="logo" src="img/Logo.png" alt="Logo" width="100%">
        </div>
        <div class="manu">
            <ul class="manu">
                <li class="home">Home</li>
                <li class="services">Services</li>
                <li class="work">Work</li>
                <li class="project">Project Details</li>
                <li class="contact">Contact</li>
            </ul>
        </div>
        <div class="bar_contact num">
            <div><img class="phoneicon" src="img/Phone-Icon.png" alt="Phone_Icon" width="100%"></div>
            <div class="number">555-123-4567</div>
            <div class="bar_contact but">
                <div class="contact_button">Contact</div>
                <div><img class="burger" src="img/Burger-bar.png" alt="Burger-Bar" width="100%"></div>
            </div>
        </div>
    </div>
</body>

</html>
