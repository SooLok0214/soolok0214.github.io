<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="css/form.css">
</head>

<body>
    <div class="card">
        <h1>Registration Form - Middle School</h1>

        <div class="button">
            <button class="player-btn">
                <div class="circle"></div>player 1
            </button>

            <button class="player-btn">
                <div class="circle"></div>player 2
            </button>
        </div>

        <form action="#" method="post">
            <div class="display-flex box-line1">
                <input type="text" id="fname" name="firstname" placeholder="First Name*" required>
                <input type="text" id="lname" name="lastname" placeholder="Last Name*" required>
            </div>

            <div class="display-flex box-line2">
                <input type="text" id="gradelvl" name="gradelevel" placeholder="Grade Level*" required>
                <input type="text" id="schoolattending" name="schoolattending" placeholder="School Attending*" required>
            </div>

            <div class="display-flex box-line3">
                <input type="text" id="skilllvl" name="skilllevel" placeholder="Skill Level*" required>
                <input type="text" id="t-shirt-size" name="tshirtsize" placeholder="T-Shirt Size*" required>
            </div>

            <div class="display-flex box-line4">
                <input type="email" id="email" name="email" placeholder="Email*" required>
                <input type="email" id="confirmemail" name="confirmemail" placeholder="Confirm Email*" required>
            </div>

            <div class="display-flex box-line5">
                <input type="number" id="phone" name="phone" placeholder="Guardian's phone number*" required>
            </div>
        </form>
    </div>

</body>

</html>
