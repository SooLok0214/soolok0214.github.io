<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
    <link rel="stylesheet" href="../css/common/common.css">
    <link rel="stylesheet" href="../css/common/common-variables.css">
    <link rel="stylesheet" href="../css/common/common-button.css">
    <link rel="stylesheet" href="../css/common/common-ets.css">
    <link rel="stylesheet" href="../css/common/common-input.css">
    <link rel="stylesheet" href="../css/common/common-typo.css">
    <script src="https://kit.fontawesome.com/3d31d4945f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="section-part">
        <!--input katherineang-->
        <div class="card max-width">
            <h2 class="form-title">Send A Message</h2>

            <div class="form-grid">
                <div class="input-group">
                    <input type="text" class="input" placeholder="Frist Name" required>
                </div>

                <div class="input-group">
                    <input type="text" class="input" placeholder="Last Name" required>
                </div>

                <div class="input-group">
                    <input type="email" class="input" placeholder="Enter your email .. *" required>
                </div>

                <div class="input-group">
                    <input type="text" class="input" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <input type="text" class="input" placeholder="Subject" required>
                </div>

                <div class="input-group">
                    <textarea class="textarea" placeholder="message" required></textarea>
                </div>

                <div class="btn btn-default-color-green btn-hover-black btn-full-width text-canter">
                    <a class="btn-white-font " href="#">SEND MESSAGE <i class="ri-arrow-right-down-line"></i></a>
                </div>
            </div>
        </div>

        <div class="card max-width">
            <div class="subscribe">
                <input type="email" class="subscribe_input" placeholder="Enter your email .. *" required>
                <div class="btn btn-default-color-green btn-hover-green-drak">
                    <a class="btn-white-font" href="#">SUBSCRIBE <i class="ri-arrow-right-down-line"></i></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
