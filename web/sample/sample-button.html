<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <link rel="stylesheet" href="../css/common/common.css">
    <link rel="stylesheet" href="../css/common/common-variables.css">
    <link rel="stylesheet" href="../css/common/common-button.css">
    <link rel="stylesheet" href="../css/common/common-ets.css">
    <link rel="stylesheet" href="../css/common/common-typo.css">
    <script src="https://kit.fontawesome.com/3d31d4945f.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        .btn-full-width,
        .btn {
            margin: 10px;
        }
    </style>
</head>

<body>
    <div class="section-part">
        <!--button soowenglok-->
        <div class="card max-width gap-default">
            <h2>Buttons</h2>
            <div
                class="btn btn-default-color-yellow btn-hover-green-drak  btn-font-hover-white btn-padding-small btn-white-arrow">
                <a class="btn-black-font" href="#">Hire A Talent <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn btn-default-color-green-light btn-hover-white btn-padding-small btn-black-arrow">
                <a class="btn-black-font" href="#">What We Offer <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn btn-default-color-yellow btn-hover-green-drak  btn-font-hover-white btn-white-arrow">
                <a class="btn-black-font" href="#">Drop Your CV <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn btn-default-color-green btn-hover-green-drak btn-white-arrow">
                <a class="btn-white-font" href="#">SUBSCRIBE <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div
                class="btn btn-default-color-black btn-hover-yellow btn-font-hover-black btn-black-arrow mb-btn-full-width">
                <a class="btn-white-font" href="#">Get Started <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn-underline-default btn-underline btn-transparent btn-font-hover-green btn-green-arrow">
                <a class="btn-black-font" href="#">Learn More <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn-default-color-green btn-hover-black btn-full-width text-canter ">
                <a class="btn-white-font " href="#">SEND MESSAGE <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn-default-color-yellow btn-hover-green  btn-font-hover-white btn-full-width text-canter ">
                <a class="btn-black-font" href="#">SEND MESSAGE <i class="ri-arrow-right-down-line"></i></a>
            </div>

            <div class="btn-default-color-black btn-hover-yellow  btn-font-hover-black btn-full-width text-canter">
                <a class="btn-white-font" href="#">Get Started <i class="ri-arrow-right-down-line"></i></a>
            </div>
        </div>
    </div>
</body>

</html>
