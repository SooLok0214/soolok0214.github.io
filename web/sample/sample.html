<!DOCTYPE html>

<head>

    <title>Sample</title>
    <link rel="stylesheet" href="../css/common/common.css">

<body>
    <header>
        <img class="logo" src="../assets/img/logo.png" alt="Logo" />
        <nav id="main-menu" class="row-flex max-width">
            <div class="menu-item menu-active">
                <a href="#">Home</a>
            </div>
            <div class="menu-item">
                <a href="#">About Us</a>
            </div>
            <div class="menu-item">

            </div>
            <div class="menu-item has-submenu-item">

        </div>

        </div>

        <div class="btn btn-default-color-green btn-hover-black btn-full-width text-canter">
